<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attique Prompts</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 6px;
  border: none;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
}

img {
  width: 100%;
  border-radius: 10px;
}

.admin {
  display: none;
  background: #111827;
  padding: 15px;
  margin: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>Attique Prompts</h1>

<input type="password" id="pass" placeholder="Enter password">
<button onclick="unlock()">Enter</button>

<div class="admin" id="adminPanel">
  <input type="file" id="image">
  <input type="text" id="text" placeholder="Prompt">
  <button onclick="upload()">Upload</button>
</div>

<input id="search" placeholder="Search...">

<div id="gallery" class="grid"></div>

<!-- ✅ FIXED SUPABASE CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// 🔴 IMPORTANT: variable rename (fix)
const supabaseClient = window.supabase.createClient(
  "YOUR_URL",
  "YOUR_ANON_KEY"
);

// PASSWORD
function unlock() {
  const pass = document.getElementById("pass").value;

  if (pass === "attique786") {
    document.getElementById("adminPanel").style.display = "block";
    alert("Unlocked!");
  } else {
    alert("Wrong password");
  }
}

// UPLOAD
async function upload() {
  const file = document.getElementById("image").files[0];
  const text = document.getElementById("text").value;

  if (!file || !text) {
    alert("Fill all fields");
    return;
  }

  const fileName = Date.now() + file.name;

  // upload image
  const { error: uploadError } = await supabaseClient.storage
    .from("images")
    .upload(fileName, file);

  if (uploadError) {
    alert(uploadError.message);
    return;
  }

  const { data } = supabaseClient.storage
    .from("images")
    .getPublicUrl(fileName);

  // save data
  await supabaseClient.from("prompts").insert([
    { text: text, image: data.publicUrl }
  ]);

  alert("Uploaded!");
  load();
}

// LOAD
async function load() {
  const { data } = await supabaseClient.from("prompts").select("*");
  render(data || []);
}

// DISPLAY
function render(data) {
  const val = document.getElementById("search").value.toLowerCase();
  const gallery = document.getElementById("gallery");

  gallery.innerHTML = "";

  data
    .filter(p => p.text.toLowerCase().includes(val))
    .forEach(item => {
      gallery.innerHTML += `
        <div class="card">
          <img src="${item.image}">
          <p>${item.text}</p>
          <button onclick="copyText('${item.text}')">Copy</button>
        </div>
      `;
    });
}

// COPY
function copyText(text) {
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

// SEARCH
document.getElementById("search").oninput = load;

// INIT
load();
</script>

</body>
</html>
